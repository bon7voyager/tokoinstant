# Nginx reverse proxy for Kilat (Next.js running on 127.0.0.1:3000).
#
# Install:
#   sudo cp deploy/nginx-kilat.shop.conf /etc/nginx/sites-available/kilat.shop
#   sudo ln -s /etc/nginx/sites-available/kilat.shop /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see DEPLOY.md) to add HTTPS automatically.

server {
    listen 80;
    listen [::]:80;
    server_name kilat.shop www.kilat.shop;

    # Product photo uploads can be a few MB.
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
